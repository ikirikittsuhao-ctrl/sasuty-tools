<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Source Code Viewer</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { cursor: pointer; padding: 5px 10px; }
        textarea { width: 100%; height: 400px; font-family: monospace; }
        .action-btns { margin-top: 10px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-container">
            <div class="tool-title">ソースコード表示</div>
            <button class="back-btn" onclick="history.back()">戻る</button>
        </header>

        <div class="main-panel">
            <div class="form-group">
                <input type="text" id="url-input" placeholder="https://example.com">
            </div>
            <button class="btn" onclick="fetchSource()">ソースを取得</button>
            
            <div style="margin-top: 20px;">
                <label>ソースコード:</label>
                <textarea id="source-output" readonly></textarea>
                <div class="action-btns">
                    <button class="btn" onclick="copySource()">コピー</button>
                    <button class="btn" onclick="runSource()">実行（プレビュー）</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchSource() {
            const url = document.getElementById('url-input').value;
            const output = document.getElementById('source-output');
            
            if (!url) {
                alert("URLを入力してください");
                return;
            }

            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

            try {
                output.value = "読み込み中...";
                const res = await fetch(proxyUrl);
                const data = await res.json();
                output.value = data.contents;
            } catch (err) {
                output.value = "エラーが発生しました。URLを確認するか、そのサイトが外部からの取得を許可していない可能性があります。";
            }
        }

        function copySource() {
            const output = document.getElementById('source-output');
            output.select();
            document.execCommand('copy');
            alert("クリップボードにコピーしました");
        }

        function runSource() {
            const code = document.getElementById('source-output').value;
            if (!code || code === "読み込み中..." || code.startsWith("エラー")) {
                alert("実行できるコードがありません");
                return;
            }
            const newWindow = window.open();
            newWindow.document.write(code);
            newWindow.document.close();
        }
    </script>
</body>
</html>
