<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>MINECRAFT - 平原の木・リアル肉・ゾンビ襲来版</title>
    <style>
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; 
            user-select: none; -webkit-user-select: none; 
            touch-action: none; 
            overscroll-behavior: none;
            -webkit-text-size-adjust: none;
            font-family: sans-serif; background-color: #050505; 
        }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* 🏠 タイトル画面 */
        #home-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #2b2b2b; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 10px;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
            touch-action: pan-y;
        }
        #game-title { color: white; font-size: 24px; font-weight: bold; text-shadow: 3px 3px 0px #000; text-align: center; margin-bottom: 5px; }
        .menu-btn { width: 240px; padding: 12px; background: #555; border: 2px solid #ccc; color: white; font-size: 14px; font-weight: bold; text-align: center; cursor: pointer; border-radius: 4px; box-shadow: 0 4px 0 #333; box-sizing: border-box; }
        .menu-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; }
        .input-box { width: 240px; padding: 10px; background: #222; border: 2px solid #555; color: #fff; border-radius: 4px; font-size: 12px; text-align: center; box-sizing: border-box; }
        
        /* ⏸️ ポーズ画面 */
        #pause-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 150; gap: 12px;
        }
        .setting-row { display: flex; flex-direction: column; align-items: center; gap: 4px; color: white; font-size: 13px; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 5px; width: 220px; }
        .setting-row select { width: 100%; padding: 4px; background: #333; color: white; border: 1px solid #666; border-radius: 3px; }

        /* UI基本要素 */
        #pause-trigger { position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4); border-radius: 6px; color: white; font-size: 16px; font-weight: bold; text-align: center; line-height: 36px; cursor: pointer; z-index: 80; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; transform: translate(-50%, -50%); color: rgba(255,255,255,0.8); font-size: 20px; pointer-events: none; z-index: 10; display: none; text-align: center; line-height: 14px; }
        
        /* 🧱 採掘プログレスバー */
        #break-progress-container { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 6px; background: rgba(0,0,0,0.5); border: 1px solid #fff; display: none; z-index: 15; }
        #break-progress-bar { width: 0%; height: 100%; background: #ffaa00; }

        /* 左上ステータス情報 */
        #survival-ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 1px 1px 2px black; font-weight: bold; z-index: 10; font-size: 11px; display: none; pointer-events: none; line-height: 1.5; }
        
        /* 🫧 酸素ゲージ */
        #oxygen-ui { position: absolute; bottom: 135px; left: 50%; transform: translateX(-50%); display: none; gap: 2px; z-index: 25; pointer-events: none; background: rgba(0,0,0,0.4); padding: 3px 6px; border-radius: 6px; }
        .bubble { width: 8px; height: 8px; background: #00aaff; border-radius: 50%; border: 1px solid #ffffff; box-shadow: 0 0 2px #000; }
        #damage-flash { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0); pointer-events: none; z-index: 90; transition: background 0.08s ease; }

        /* 📱 画面最下部UIコンテナ */
        #bottom-ui-wrapper {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: none; flex-direction: column; align-items: center; gap: 8px;
            width: 100%; max-width: 360px; pointer-events: none; z-index: 30;
        }

        /* 🍖 グラフィカルHUDバー */
        #hud-bars-container { 
            display: flex; width: 310px; height: 20px; justify-content: space-between; align-items: center; pointer-events: none;
        }
        .hud-side-bar { display: flex; align-items: center; gap: 1px; min-height: 16px; position: relative; }
        .hud-pixel-icon { width: 12px; height: 12px; image-rendering: pixelated; }
        #armor-bar { position: absolute; top: -14px; left: 0; display: flex; gap: 1px; min-height: 12px; }

        /* 🧱 下部ホットバーUI */
        #hotbar { display: flex; gap: 2px; background: #8f8f8f; padding: 3px; border: 3px solid #3c3c3c; border-radius: 2px; width: 100%; justify-content: center; box-sizing: border-box; pointer-events: auto; touch-action: manipulation; }
        .ui-slot { width: 36px; height: 36px; background: #8b8b8b; border: 3px solid; border-color: #373737 #ffffff #ffffff #373737; position: relative; display: flex; justify-content: center; align-items: center; cursor: pointer; box-sizing: border-box; }
        .ui-slot.active { border-color: #ffffff; background: #adadad; }
        .slot-count { position: absolute; bottom: 1px; right: 1px; font-size: 10px; color: white; font-weight: bold; text-shadow: 1px 1px 0 #000; font-family: monospace; z-index: 10; pointer-events: none; }
        #bag-toggle-btn { padding: 5px 10px; background: #555; border: 2px solid #ccc; color: white; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; pointer-events: auto; text-align: center; width: 150px; touch-action: manipulation; }

        /* 🕹️ 操作パッド */
        #touch-controls-left { position: absolute; bottom: 20px; left: 20px; width: 130px; height: 130px; z-index: 10; display: none; }
        .dpad-btn { position: absolute; width: 42px; height: 42px; background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255,255,255,0.4); border-radius: 8px; color: white; text-align: center; line-height: 40px; font-weight: bold; font-size: 18px; touch-action: none; }
        #btn-up { top: 0; left: 44px; } #btn-left { top: 44px; left: 0; } #btn-right { top: 44px; left: 88px; } #btn-down { top: 88px; left: 44px; }

        #touch-controls-right { position: absolute; bottom: 20px; right: 20px; width: 140px; height: 140px; z-index: 10; display: none; }
        .action-btn { position: absolute; background: rgba(0, 0, 0, 0.6); border: 2px solid rgba(255,255,255,0.5); color: white; text-align: center; font-weight: bold; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 50%; touch-action: none; }
        #btn-attack { top: 0; left: 0; width: 60px; height: 60px; background: rgba(200,50,50,0.6); font-size: 11px; }
        #btn-use { top: 0; right: 0; width: 60px; height: 60px; background: rgba(50,150,50,0.7); font-size: 11px; } 
        #btn-jump { bottom: 0; right: 0; width: 55px; height: 55px; font-size: 12px; }

        /* 🎒 インベントリ / かまど画面 */
        #inventory-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 200; display: none; color: white; box-sizing: border-box; padding: 15px; flex-direction: column; gap: 10px; touch-action: none; }
        .inv-header { display: flex; justify-content: space-between; align-items: center; }
        .inv-title { font-size: 15px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        .close-btn { padding: 6px 12px; background: #aa3333; border: 2px solid #ffaaaa; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #holding-status { background: #aa7700; padding: 4px; border-radius: 4px; text-align: center; font-size: 12px; font-weight: bold; display: none; }
        .inv-container { display: flex; flex: 1; gap: 10px; min-height: 0; }
        .inv-section { flex: 1.2; background: #4a4a4a; border: 3px solid #222; padding: 8px; border-radius: 4px; display: flex; flex-direction: column; }
        .grid-wrapper { display: flex; flex-wrap: wrap; gap: 5px; overflow-y: auto; align-content: flex-start; flex: 1; touch-action: pan-y; }
        
        /* 🛡️ 装備スロット */
        #armor-slots-container { display: flex; flex-direction: column; gap: 4px; background: #3a3a3a; padding: 6px; border: 2px solid #222; border-radius: 4px; margin-bottom: 5px; align-items: center; }
        .armor-row { display: flex; gap: 8px; align-items: center; width: 100%; justify-content: center; }
        .armor-label { font-size: 11px; color: #ccc; width: 40px; text-align: right; }

        .craft-layout { flex: 0.8; display: flex; flex-direction: column; align-items: center; gap: 8px; justify-content: center; }
        .craft-grid-dynamic { display: grid; gap: 4px; background: #3a3a3a; padding: 6px; border: 2px solid #222; border-radius: 4px; }
        .craft-slot { width: 44px; height: 44px; background: #8b8b8b; border: 3px solid; border-color: #373737 #ffffff #ffffff #373737; display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; }
        .craft-arrow-container { display: flex; align-items: center; gap: 10px; }
        .craft-arrow { font-size: 24px; color: #fff; text-shadow: 2px 2px 0 #000; }
        .craft-action-btn { padding: 6px 12px; background: #3a7a3a; border: 2px solid #66bb66; color: white; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .craft-action-btn:disabled { background: #555; border-color: #777; color: #aaa; cursor: not-allowed; }
        .clear-btn { padding: 3px 8px; background: #777; border: 1px solid #ccc; color: white; font-size: 11px; border-radius: 3px; cursor: pointer; }

        /* 🔥 かまどレイアウト */
        #furnace-layout { display: none; flex-direction: column; align-items: center; gap: 8px; justify-content: center; }
        .furnace-core { display: flex; flex-direction: column; align-items: center; gap: 4px; background: #3a3a3a; padding: 10px; border: 2px solid #222; border-radius: 4px; }
        #furnace-fire { font-size: 18px; color: #555; }
        #furnace-fire.burning { color: #ff5500; text-shadow: 0 0 6px #ffaa00; }
        #furnace-progress-text { font-size: 11px; color: #aaa; font-family: monospace; }

        .pixel-art { width: 28px; height: 28px; image-rendering: pixelated; image-rendering: crisp-edges; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="home-screen">
        <div id="game-title">MINECRAFT<br><span style="font-size:12px; color:#ffaa00;">🧟 リアルお肉テクスチャ＆平原の木＆ゾンビ追加版</span></div>
        <input type="number" id="seed-input" class="input-box" placeholder="新規シード値 (空欄でランダム)">
        <div class="menu-btn" onclick="clickStartGame()">世界を新規生成</div>
        <hr style="width:240px; border:1px solid #444; margin:5px 0;">
        <input type="text" id="savecode-input" class="input-box" placeholder="ここにセーブコードを貼り付け">
        <div class="menu-btn" style="background:#3a5a7a; border-color:#6e9ebb;" onclick="loadWithSaveCode()">セーブコードからロード</div>
    </div>

    <div id="pause-screen">
        <div style="color:white; font-size:22px; font-weight:bold; margin-bottom:5px;">一時停止</div>
        <div class="setting-row">
            <label for="render-dist-select">👁️ 描画距離 (チャンク半径)</label>
            <select id="render-dist-select" onchange="changeRenderDistance(this.value)">
                <option value="1">1 (超軽量)</option>
                <option value="2" selected>2 (標準)</option>
                <option value="3">3 (遠景)</option>
            </select>
        </div>
        <div class="menu-btn" style="background:#3a6a3a; border-color:#6ebb6e;" onclick="togglePause()">再開</div>
        <div style="color:#aaa; font-size:11px; margin-top:5px;">↓セーブコード</div>
        <input type="text" id="savecode-output" class="input-box" style="width:260px;" readonly onclick="this.select();">
        <div class="menu-btn" style="background:#aa3333; border-color:#ffaaaa; margin-top:10px;" onclick="backToHome()">⚠️ タイトルへ戻る</div>
    </div>

    <div id="pause-trigger" onclick="togglePause()">⏸️</div>
    <div id="crosshair">+</div>

    <div id="break-progress-container"><div id="break-progress-bar"></div></div>
    
    <div id="survival-ui">
        <div id="hud-fps" style="color:#00ffcc; font-weight:bold;">FPS: --</div>
        <div id="hud-time" style="color:#ffaa00; font-weight:bold;">時間: 0 (昼) 明るさ: 15</div>
        <div id="hud-biome" style="color:#66bb66;">バイオーム: 探索中</div>
        <div id="hud-seed" style="color:#ffeb3b;">SEED: 0</div>
        <div id="hud-pos" style="color:#cccccc;">XYZ: 0.0, 0.0, 0.0</div>
    </div>

    <div id="oxygen-ui"></div>
    <div id="damage-flash"></div>

    <div id="bottom-ui-wrapper">
        <div id="hud-bars-container">
            <div class="hud-side-bar">
                <div id="armor-bar"></div>
                <div id="heart-bar" style="display:flex; gap:1px;"></div>
            </div>
            <div class="hud-side-bar" id="food-bar" style="display:flex; flex-direction:row-reverse; gap:1px;"></div>
        </div>
        <div id="hotbar"></div>
        <div id="bag-toggle-btn" onclick="toggleInventory()">🎒 インベントリ</div>
    </div>
    
    <div id="touch-controls-left">
        <div id="btn-up" class="dpad-btn">▲</div><div id="btn-left" class="dpad-btn">◀</div>
        <div id="btn-right" class="dpad-btn">▶</div><div id="btn-down" class="dpad-btn">▼</div>
    </div>

    <div id="touch-controls-right">
        <div id="btn-attack" class="action-btn">⚔️<div>攻撃/破壊</div></div>
        <div id="btn-use" class="action-btn">🧱<div>使用/設置</div></div> 
        <div id="btn-jump" class="action-btn">▲<div>跳ぶ</div></div>
    </div>

    <div id="inventory-screen">
        <div class="inv-header">
            <div id="inv-screen-title" class="inv-title">🎒 インベントリ</div>
            <div class="close-btn" onclick="toggleInventory()">閉じる</div>
        </div>
        <div id="holding-status"></div>
        <div class="inv-container">
            <div class="inv-section">
                <div id="armor-slots-container">
                    <div style="font-size:11px; color:#aaa; margin-bottom:3px;">装備インベントリ</div>
                    <div class="armor-row"><span class="armor-label">頭:</span><div id="armor-slot-0" class="craft-slot"></div></div>
                    <div class="armor-row"><span class="armor-label">胸:</span><div id="armor-slot-1" class="craft-slot"></div></div>
                    <div class="armor-row"><span class="armor-label">脚:</span><div id="armor-slot-2" class="craft-slot"></div></div>
                    <div class="armor-row"><span class="armor-label">足:</span><div id="armor-slot-3" class="craft-slot"></div></div>
                    <div class="armor-row"><span class="armor-label">盾:</span><div id="armor-slot-4" class="craft-slot"></div></div>
                </div>
                <div class="section-title" style="font-size:11px; margin-bottom:3px;">インベントリ一覧</div>
                <div id="bag-grid" class="grid-wrapper"></div>
            </div>
            
            <div id="normal-craft-layout" class="inv-section craft-layout">
                <div id="craft-box-title" class="section-title">クラフト</div>
                <div id="craft-grid" class="craft-grid-dynamic"></div>
                <button class="clear-btn" onclick="clearCraftGrid()">戻す</button>
                <div class="craft-arrow-container">
                    <div class="craft-arrow">➔</div>
                    <div>
                        <div id="craft-result-slot" class="craft-slot" style="width:50px; height:50px; margin-bottom:5px;"></div>
                        <button id="craft-execute-btn" class="craft-action-btn" disabled onclick="triggerCraft()">合成</button>
                    </div>
                </div>
            </div>

            <div id="furnace-layout" class="inv-section craft-layout">
                <div class="section-title">🔥 かまど精錬</div>
                <div class="furnace-core">
                    <div id="furnace-input-slot" class="craft-slot"></div>
                    <div id="furnace-fire">▼</div>
                    <div id="furnace-fuel-slot" class="craft-slot"></div>
                </div>
                <div class="craft-arrow-container">
                    <div class="craft-arrow">➔</div>
                    <div id="furnace-output-slot" class="craft-slot" style="width:50px; height:50px;"></div>
                </div>
                <div id="furnace-progress-text">精錬停止中</div>
                <button class="clear-btn" onclick="clearFurnaceGrid()">戻す</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('touchmove', function(e) {
            if(!e.target.closest('#bag-grid')) { e.preventDefault(); }
        }, { passive: false });

        function makeBase64Icon(drawFn) {
            const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d'); drawFn(ctx); return canvas.toDataURL();
        }

        const HUD_ICONS = {
            heart_full: makeBase64Icon(c => { c.fillStyle="#ff2222"; c.fillRect(2,4,12,8); c.fillRect(4,2,3,2); c.fillRect(9,2,3,2); c.fillRect(3,12,10,2); c.fillRect(5,14,6,2); c.fillStyle="#ffffff"; c.fillRect(4,4,2,2); }),
            heart_half: makeBase64Icon(c => { c.fillStyle="#ff2222"; c.fillRect(2,4,6,8); c.fillRect(4,2,3,2); c.fillRect(3,12,5,2); c.fillRect(5,14,3,2); c.fillStyle="#ffffff"; c.fillRect(4,4,2,2); c.fillStyle="#333333"; c.fillRect(8,4,6,8); c.fillRect(9,2,3,2); c.fillRect(8,12,5,2); c.fillRect(8,14,3,2); }),
            heart_empty: makeBase64Icon(c => { c.fillStyle="#333333"; c.fillRect(2,4,12,8); c.fillRect(4,2,3,2); c.fillRect(9,2,3,2); c.fillRect(3,12,10,2); c.fillRect(5,14,6,2); }),
            meat_full: makeBase64Icon(c => { c.fillStyle="#9c533c"; c.fillRect(4,3,9,10); c.fillRect(6,2,5,12); c.fillStyle="#ffffff"; c.fillRect(2,7,3,2); c.fillRect(3,6,2,4); }),
            meat_half: makeBase64Icon(c => { c.fillStyle="#9c533c"; c.fillRect(4,3,5,10); c.fillRect(6,2,3,12); c.fillStyle="#ffffff"; c.fillRect(2,7,3,2); c.fillStyle="#333333"; c.fillRect(9,3,4,10); }),
            meat_empty: makeBase64Icon(c => { c.fillStyle="#333333"; c.fillRect(4,3,9,10); c.fillRect(6,2,5,12); }),
            armor_full: makeBase64Icon(c => { c.fillStyle="#cbd4d5"; c.fillRect(2,2,12,10); c.fillRect(4,12,8,3); c.fillStyle="#ffffff"; c.fillRect(4,4,2,4); }),
            armor_half: makeBase64Icon(c => { c.fillStyle="#cbd4d5"; c.fillRect(2,2,6,10); c.fillRect(4,12,4,3); c.fillStyle="#333333"; c.fillRect(8,2,6,10); c.fillRect(8,12,4,3); }),
            leather: makeBase64Icon(c => { c.fillStyle="#a0522d"; c.fillRect(3,2,10,12); c.fillRect(1,5,14,6); }),
            helm: makeBase64Icon(c => { c.fillStyle="#cbd4d5"; c.fillRect(4,2,8,7); c.fillRect(2,5,12,5); }),
            chest: makeBase64Icon(c => { c.fillStyle="#cbd4d5"; c.fillRect(2,3,12,11); c.fillRect(5,1,6,2); }),
            legs: makeBase64Icon(c => { c.fillStyle="#cbd4d5"; c.fillRect(3,2,10,13); c.fillStyle="#000000"; c.fillRect(6,6,4,9); }),
            boots: makeBase64Icon(c => { c.fillStyle="#cbd4d5"; c.fillRect(2,8,5,6); c.fillRect(9,8,5,6); }),
            bed: makeBase64Icon(c => { c.fillStyle="#cc2222"; c.fillRect(1,4,14,6); c.fillStyle="#ffffff"; c.fillRect(1,2,5,8); }),
            iron_ingot: makeBase64Icon(c => { c.fillStyle="#e2e6e7"; c.fillRect(3,4,10,7); c.fillStyle="#ffffff"; c.fillRect(4,5,8,1); c.fillStyle="#b0b7ba"; c.fillRect(3,11,10,1); }),
            bucket_empty: makeBase64Icon(c => { c.fillStyle="#b0b7ba"; c.fillRect(3,3,2,8); c.fillRect(11,3,2,8); c.fillRect(5,11,6,2); }),
            bucket_water: makeBase64Icon(c => { c.fillStyle="#b0b7ba"; c.fillRect(3,3,2,8); c.fillRect(11,3,2,8); c.fillRect(5,11,6,2); c.fillStyle="#4d7aff"; c.fillRect(5,5,6,6); }),
            shield: makeBase64Icon(c => { c.fillStyle="#886b3f"; c.fillRect(3,2,10,10); c.fillRect(5,12,6,2); c.fillStyle="#b0b7ba"; c.fillRect(2,1,12,1); c.fillRect(2,2,1,10); c.fillRect(13,2,1,10); }),
            
            // 🍖 16x16 リアルで見分けやすいお肉グラフィック
            mutton_raw: makeBase64Icon(c => { c.fillStyle="#e26a6a"; c.fillRect(4,3,8,9); c.fillStyle="#f3a4a4"; c.fillRect(5,4,4,3); c.fillStyle="#ffffff"; c.fillRect(2,11,4,2); c.fillRect(1,12,2,2); }),

        function createPixelTexture(mode, localSeed) {
            const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d'); let seed = (localSeed || currentSeed) + mode.charCodeAt(0) * 7;
            function rnd() { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }
            const getCol = (arr) => arr[Math.floor(rnd() * arr.length)];
            for(let y=0; y<16; y++) {
                for(let x=0; x<16; x++) {
                    if (mode === "grass_top") ctx.fillStyle = getCol(COLOR_MAP.grass_top);
                    else if (mode === "grass_side") ctx.fillStyle = (y < 4 + Math.floor(rnd()*2)) ? getCol(COLOR_MAP.grass_top) : getCol(COLOR_MAP.grass_side);
                    else if (mode === "dirt") ctx.fillStyle = getCol(COLOR_MAP.dirt);
                    else if (mode === "stone") ctx.fillStyle = getCol(COLOR_MAP.stone);
                    else if (mode === "log_side") ctx.fillStyle = getCol(COLOR_MAP.log_side);
                    else if (mode === "log_top") ctx.fillStyle = getCol(COLOR_MAP.log_top);
                    else if (mode === "leaves") ctx.fillStyle = getCol(COLOR_MAP.leaves);
                    else if (mode === "coal") ctx.fillStyle = ((x+y)%5===0)?getCol(COLOR_MAP.coal_ore):getCol(COLOR_MAP.stone);
                    else if (mode === "iron") ctx.fillStyle = ((x*y+x)%7===0)?getCol(COLOR_MAP.iron_ore):getCol(COLOR_MAP.stone);
                    else if (mode === "planks") ctx.fillStyle = (y%4===0)? "#886b3f" : getCol(COLOR_MAP.planks);
                    else if (mode === "sand") ctx.fillStyle = getCol(COLOR_MAP.sand);
                    else if (mode === "water") ctx.fillStyle = getCol(COLOR_MAP.water);
                    else if (mode === "bedrock") ctx.fillStyle = getCol(COLOR_MAP.bedrock);
                    else if (mode === "wool") ctx.fillStyle = getCol(COLOR_MAP.wool);
                    else if (mode === "crafting_top") ctx.fillStyle = (x===0||x===15||y===0||y===15)?"#4d3826":getCol(COLOR_MAP.planks);
                    else if (mode === "crafting_side") ctx.fillStyle = (x===0||x===15||y===0||y===15)?"#4d3826":getCol(COLOR_MAP.planks);
                    else if (mode === "furnace-side") ctx.fillStyle = getCol(COLOR_MAP.stone);
                    else if (mode === "furnace-front") ctx.fillStyle = (x>=3&&x<=12&&y>=8&&y<=13)?"#151515":getCol(COLOR_MAP.stone);
                    else if (mode === "bed_block") ctx.fillStyle = (x < 6) ? "#ffffff" : "#cc2222";
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            return canvas.toDataURL();
        }

        function pseudoRandom2D(x, z, s) { let n = Math.sin(x * 12.9898 + z * 78.233 + s) * 43758.5453; return n - Math.floor(n); }
        function getClimate(x, z) {

            if (v > 0.4) return "砂漠"; if (v < -0.45) return "海"; if (v >= 0.0 && v <= 0.4) return "森林"; return "平原";
        }
        function getHeightNoise(x, z) {
            let b = getClimate(x, z); let base = Math.sin(x * 0.03) * Math.cos(z * 0.03) * 3; 
            if (b === "砂漠") return 13 + base * 0.5; if (b === "海") return 6 + base * 0.4; if (b === "森林") return 14 + base * 1.2; return 12 + base; 
        }

        function checkBlockCollision(px, py, pz) {

            let minX = Math.floor(px - r), maxX = Math.floor(px + r), minY = Math.floor(py), maxY = Math.floor(py + h), minZ = Math.floor(pz - r), maxZ = Math.floor(pz + r);
            for (let x = minX; x <= maxX; x++) {

        // 🧟 モブ生成とAI処理（夜のゾンビスポン対応）
        function processDynamicMobSpawning() {
            mobs = mobs.filter(m => { let d = Math.sqrt((m.x-playerPhysics.x)**2 + (m.z-playerPhysics.z)**2); if (d > 32 || m.hp <= 0) { if(m.mesh) scene.remove(m.mesh); return false; } return true; });
            
            let isNight = gameTime >= 13000 && gameTime < 23000;
            if (mobs.length < MAX_MOBS && Math.random() < 0.08) {
                let rx = playerPhysics.x + (Math.random()-0.5)*40; let rz = playerPhysics.z + (Math.random()-0.5)*40;
                if(Math.sqrt((rx-playerPhysics.x)**2+(rz-playerPhysics.z)**2) > 8) {
                    let ry = Math.floor(getHeightNoise(rx, rz)) + 1; let bme = getClimate(rx, rz);
                    if(ry >= 10) {
                        let t;
                        if(isNight && Math.random() < 0.65) {
                            t = "zombie"; // 夜間は高い確率でゾンビをスポン

                let toMob = new THREE.Vector3().subVectors(mobCenter, playerEye); let distance = toMob.length();
                if (distance < minDistance) { toMob.normalize(); let dot = viewDirection.dot(toMob); if (dot > 0.90) { minDistance = distance; targetMob = m; } }
            });

        }

            function generateChunk(cx, cz) {
                const sX = cx * chunkSize, sZ = cz * chunkSize;
                for (let x = 0; x < chunkSize; x++) {
                    for (let z = 0; z < chunkSize; z++) {
                        const wx = sX + x, wz = sZ + z; const bme = getClimate(wx, wz); const sY = Math.floor(getHeightNoise(wx, wz));
                        for (let wy = Math.max(sY, 10); wy >= -10; wy--) {
                            let k = blockKey(wx, wy, wz); if (worldBlocks.has(k)) continue;
                            if (wy === -10) { worldBlocks.set(k, { type: 14, active: true }); continue; }
                            if (wy > sY && wy <= 10) { worldBlocks.set(k, { type: 13, active: true, level: 7 }); continue; }
                            
                            if (wy === sY) {
                                let finalType = (bme === "砂漠" || wy <= 10) ? 12 : 0; worldBlocks.set(k, { type: finalType, active: true });
                                
                                // 🍃 森林バイオームに加え、平原バイオームにも低確率で樹木を生成
                                let treeChance = (bme === "森林") ? 0.88 : 0.975;
                                if (wy >= 11 && pseudoRandom2D(wx, wz, currentSeed) > treeChance) {
                                    for(let h=1; h<=4; h++) worldBlocks.set(blockKey(wx, wy+h, wz), { type: 3, active: true });
                                    for(let lx=-2; lx<=2; lx++) { for(let lz=-2; lz<=2; lz++) { for(let ly=3; ly<=4; ly++) { if(Math.abs(lx)+Math.abs(lz)>3) continue; worldBlocks.set(blockKey(wx+lx, wy+ly, wz+lz), { type: 7, active: true }); } } }
                                    worldBlocks.set(blockKey(wx, wy+5, wz), { type: 7, active: true });
                                }
                            } else if (wy < sY && wy > sY - 3) {
                                worldBlocks.set(k, { type: (bme === "砂漠" || wy <= 10) ? 12 : 1, active: true });
                            } else {
                                worldBlocks.set(k, { type: 2, active: true });
                            }
                        }
                    }
                }
                
                // 鉄鉱石の塊（鉱脈）生成ロジック
                for (let x = 0; x < chunkSize; x++) {
                    for (let z = 0; z < chunkSize; z++) {
                        const wx = sX + x, wz = sZ + z;
                        if (pseudoRandom2D(wx, 55, wz + currentSeed) > 0.985) {
                            let startY = -8 + Math.floor(pseudoRandom2D(wx, wz, 999) * 17); let veinSize = 4 + Math.floor(pseudoRandom2D(wx, startY, wz) * 5);
                            let curX = wx, curY = startY, curZ = wz;
                            for(let v=0; v<veinSize; v++) {
                                let tk = blockKey(curX, curY, curZ); let baseB = worldBlocks.get(tk);
                                if(baseB && baseB.active && baseB.type === 2) { worldBlocks.set(tk, { type: 35, active: true }); }
                                let dir = Math.floor(pseudoRandom2D(curX, curY + v, curZ) * 6);
                                if(dir === 0) curX++; else if(dir === 1) curX--; else if(dir === 2) curY++; else if(dir === 3) curY--; else if(dir === 4) curZ++; else if(dir === 5) curZ--;
                            }
                        }
                        for(let wy = 9; wy >= -9; wy--) {
                            let tk = blockKey(wx, wy, wz); let baseB = worldBlocks.get(tk);
                            if(baseB && baseB.active && baseB.type === 2 && pseudoRandom2D(wx, wy, wz) > 0.97) { worldBlocks.set(tk, { type: 8, active: true }); }
                        }
                    }
                }
            }

            function checkCollisionAndMove(dx, dy, dz) {

            const clock = new THREE.Clock(); let lastBX=99, lastBZ=99;

            function animate() {

                fpsCount++; fpsTimer += dt; if(fpsTimer>=1.0){ document.getElementById('hud-fps').innerText=`FPS: ${fpsCount}`; fpsCount=0; fpsTimer=0; }

                else { let ratio = (gameTime - 23000) / 1000; skyColor = new THREE.Color().lerpColors(new THREE.Color(0x0a0a14), new THREE.Color(0x78a7ff), ratio); lightLevel = Math.round(4 + ratio * 11); timeStr = "夜明け"; ambientLight.color.setHex(0xffffff); ambientLight.intensity = 0.38 + ratio * 0.42; sunLight.intensity = 0.03 + ratio * 0.37; }
                scene.background = skyColor; if(scene.fog) scene.fog.color = skyColor;
                document.getElementById('hud-time').innerText = `時間: ${Math.floor(gameTime)} (${timeStr}) 明るさ: ${lightLevel}`;

                updateMiningLogic(dt); processDynamicMobSpawning(); processFurnace(dt);
                if(clock.getElapsedTime() % 0.25 < dt) processFluidsAndPhysics();
                if(playerPhysics.invincibleTimer > 0) playerPhysics.invincibleTimer = Math.max(0, playerPhysics.invincibleTimer - dt);

                playerPhysics.hungerExhaustion += dt * 0.08;
                if(playerPhysics.hungerExhaustion >= 4.0) { playerPhysics.hungerExhaustion = 0; playerPhysics.hunger = Math.max(0, playerPhysics.hunger - 1); updateGraphicalHUD(); }

                mobs.forEach(m => {
                    if (m.invincibleTimer > 0) { m.invincibleTimer -= dt; if (m.invincibleTimer <= 0) { m.mesh.traverse(child => { if(child.isMesh && child.userData.origColor !== undefined) child.material.color.setHex(child.userData.origColor); }); } }
                    
                    // 🧟 ゾンビまたは敵対化した通常モブのAI追跡
                    if (m.isHostile && m.hp > 0) { 
                        let pdx = playerPhysics.x - m.x; let pdz = playerPhysics.z - m.z; m.rot = Math.atan2(pdx, pdz); 
                        let spd = (m.type === "zombie") ? 1.6 : 2.2; // ゾンビは少し鈍重
                        m.vx = Math.sin(m.rot) * spd; m.vz = Math.cos(m.rot) * spd; 
                    } 
                    else { m.timer -= dt; if(m.timer<=0){ m.rot=Math.random()*6; m.timer=2+Math.random()*2; } m.vx *= Math.exp(-5.0*dt); m.vz *= Math.exp(-5.0*dt); if(Math.abs(m.vx)<0.02){ m.vx=Math.sin(m.rot)*0.5; m.vz=Math.cos(m.rot)*0.5; } }
                    
                    m.vy -= 12.0*dt; m.y += m.vy*dt;
                    let f = worldBlocks.get(blockKey(m.x, m.y, m.z)); if(f&&f.active&&f.type!==13&&m.vy<0){ m.y=Math.floor(m.y)+1; m.vy=0; if(Math.random()<0.02 || m.isHostile) m.vy=3.5; }
                    m.x += m.vx*dt; m.z += m.vz*dt; if(m.mesh){ m.mesh.position.set(m.x,m.y,m.z); m.mesh.rotation.y=m.rot; }
                    
                    if(m.isHostile && m.hp > 0) {
                        let distToPlayer = Math.sqrt((m.x-playerPhysics.x)**2 + (m.y-playerPhysics.y)**2 + (m.z-playerPhysics.z)**2);
                        if(distToPlayer < 1.1 && playerPhysics.invincibleTimer === 0) {
                            
                            // 🛡️ 盾による完全防御チェック

                            if (isShieldActive) {
                                playerPhysics.invincibleTimer = 0.4;

                                // 防御力の計算
                                let totalArmor = 0; armorSlots.forEach(s => { if(s) totalArmor += ITEMS[s.id].armorValue || 0; });
                                let baseDmg = (m.type === "zombie") ? 3 : 1;
                                let reduction = Math.min(20, totalArmor) * 0.04;
                                let finalDmg = Math.max(1, Math.round(baseDmg * (1 - reduction)));
                                
                                playerPhysics.hp = Math.max(0, playerPhysics.hp - finalDmg); playerPhysics.invincibleTimer = 0.5;
                            }
                            
                            let nkx = playerPhysics.x - m.x; let nkz = playerPhysics.z - m.z;
                            let nkl = Math.sqrt(nkx*nkx + nkz*nkz) || 1;
                            playerPhysics.vy = 4.2; playerPhysics.knockbackX = (nkx / nkl) * 6.5; playerPhysics.knockbackZ = (nkz / nkl) * 6.5;
                            const flash = document.getElementById('damage-flash'); flash.style.background = "rgba(255, 0, 0, 0.4)";
                            setTimeout(() => flash.style.background="transparent", 150); updateGraphicalHUD();
                            if (playerPhysics.hp <= 0) { executePlayerDeathRespawn(); }
                        }
                    }
                });

                let p = playerPhysics; let inWater = isFluid(p.x, p.y+0.2, p.z);
                if (inWater) { p.vy -= 3.0 * dt; if (p.vy < -1.2) p.vy = -1.2; if (jumpPressed) { p.vy += (1.5 - p.vy) * 7 * dt; } else { p.vy *= Math.exp(-3.0 * dt); } } else { p.vy -= 14.0 * dt; }
                let headInWater = isFluid(p.x, p.y + p.eyeHeight, p.z); const oxUI = document.getElementById('oxygen-ui');
                if (headInWater) {
                    p.oxygen = Math.max(0, p.oxygen - dt * 25); oxUI.style.display = 'flex'; oxUI.innerHTML = '';

                    if(p.oxygen <= 0 && playerPhysics.invincibleTimer === 0) { p.hp = Math.max(0, p.hp - 2); p.invincibleTimer = 0.5; updateGraphicalHUD(); if (playerPhysics.hp <= 0) { executePlayerDeathRespawn(); } }
                } else { p.oxygen = Math.min(p.maxOxygen, p.oxygen + dt * 80); oxUI.style.display = 'none'; }

                phi = THREE.MathUtils.degToRad(90 - lat); theta = THREE.MathUtils.degToRad(lon);
                camera.position.set(p.x, p.y + p.eyeHeight, p.z);
                let target = new THREE.Vector3(p.x + Math.sin(phi)*Math.cos(theta), p.y + p.eyeHeight + Math.cos(phi), p.z + Math.sin(phi)*Math.sin(theta)); camera.lookAt(target);

                let fwd = new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize();
                let rt = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();
                let mx = Number(move.r) - Number(move.l); let mz = Number(move.f) - Number(move.b);
                let targetVx = 0, targetVz = 0; let maxSpeed = inWater ? 1.8 : 4.2;
                if (mx !== 0 || mz !== 0) { targetVx = (fwd.x * mz + rt.x * mx) * maxSpeed; targetVz = (fwd.z * mz + rt.z * mx) * maxSpeed; p.vx += (targetVx - p.vx) * 12 * dt; p.vz += (targetVz - p.vz) * 12 * dt; } else { p.vx += (0 - p.vx) * 16 * dt; p.vz += (0 - p.vz) * 16 * dt; }
                p.knockbackX += (0 - p.knockbackX) * 9.0 * dt; p.knockbackZ += (0 - p.knockbackZ) * 9.0 * dt;

                checkCollisionAndMove((p.vx + p.knockbackX) * dt, p.vy * dt, (p.vz + p.knockbackZ) * dt);
                if(p.y < -12) { executePlayerDeathRespawn(); } 
                let cbx = Math.floor(p.x), cbz = Math.floor(p.z); if(cbx!==lastBX || cbz!==lastBZ){ window.updateLoadedChunks(); lastBX=cbx; lastBZ=cbz; }
                document.getElementById('hud-biome').innerText = `バイオーム: ${getClimate(p.x, p.z)}`;
                document.getElementById('hud-pos').innerText = `XYZ: ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
                renderer.render(scene, camera);
            }
            window.updateLoadedChunks(); animate();
        }
    </script>
