<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顔面偏差値診断 </title>
    <link rel="stylesheet" href="/static/css/style.css">
    
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        .preview-container {
            position: relative;
            width: 100%;
            min-height: 250px;
            border: 2px dashed var(--border-color);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-bottom: 20px;
            cursor: pointer;
            overflow: hidden;
            background-color: #fafafa;
        }
        #target-image {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            display: block;
        }

        /* --- AI処理中のスキャンアニメーション --- */
        .ai-scanner {
            position: absolute;
            inset: 0;
            background: rgba(0, 10, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
            animation: scan-anim 1.5s linear infinite;
        }
        @keyframes scan-anim {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-text {
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
            text-shadow: 0 0 5px #00ff00;
        }

        .user-info {
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 600;
            background: #eee;
            padding: 8px;
            border-radius: 4px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: 700;
            color: var(--accent-color);
            margin: 10px 0;
            letter-spacing: -0.05em;
            text-align: center;
        }
        .score-display span {
            font-size: 1.2rem;
            font-weight: 500;
            margin-right: 5px;
            color: var(--text-sub);
        }
        
        .detail-table {
            width: 100%;
            margin: 20px 0;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .detail-table th, .detail-table td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }
        .detail-table th {
            font-weight: 600;
            color: var(--text-main);
            width: 65%;
        }
        .detail-table td {
            color: var(--text-sub);
            text-align: right;
        }
        .score-value {
            font-weight: 600;
            color: var(--text-main);
        }

        .comment-display {
            font-size: 0.9rem;
            color: var(--text-sub);
            text-align: justify;
            line-height: 1.6;
            margin-top: 15px;
            padding: 15px;
            background: #fafafa;
            border-radius: 4px;
        }
        .status-message {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 10px;
            text-align: center;
        }
        .error-message {
            color: #d93025;
            background-color: #fce8e6;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #d93025;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="tool-title">顔面偏差値 <span style="font-size:0.7rem; font-weight:normal; letter-spacing:0; color:red;"></span></span>
        <a href="/home.html" class="back-link">戻る</a>
    </header>

    <main class="main-panel">
        <div id="setup-stage">
            <div id="error-display" class="error-message hidden">
                顔が検出されませんでした。正面を向いた鮮明な写真を使用してください。
            </div>

            <div class="form-group">
                <label>スキャンする顔写真を選択</label>
                <div class="preview-container" id="drop-zone">
                    <span id="drop-text">クリックして顔写真（正面）をアップロード</span>
                    <img id="target-image" class="hidden" alt="Upload preview">
                    
                    <div id="ai-scanner" class="ai-scanner hidden">
                        <div class="scan-line"></div>
                        <div class="scan-text">
                            DEEP SCANNING...<br>
                            <span id="scan-progress" style="font-size: 1.5rem;">0%</span><br>
                            <span id="scan-detail" style="font-size: 0.75rem; font-weight: normal; margin-top:10px; display:block;">INITIALIZING...</span>
                        </div>
                    </div>
                </div>
                <input type="file" id="file-input" accept="image/*" class="hidden">
            </div>

            <button type="button" class="btn" id="analyze-btn" disabled>AIモデル読み込み中...</button>
            <p class="status-message" id="status-text">システムを初期化しています...</p>
        </div>

        <div id="result-stage" class="result-area hidden">
            <label>ディープスキャン総合評価</label>
            
            <div class="user-info">
                [ 検出データ ] 推定年齢: <span id="age-output" style="color:var(--accent-color);">--</span>歳 / 感情ベース: <span id="expression-output" style="color:var(--accent-color);">--</span>
            </div>

            <div class="score-display"><span>総合偏差値</span><span id="score-output">--</span></div>
            
            <table class="detail-table">
                <thead>
                    <tr>
                        <th>詳細解析項目 (100点満点)</th>
                        <th>AI スコア</th>
                    </tr>
                </thead>
                <tbody id="score-tbody">
                </tbody>
            </table>

            <p class="comment-display" id="comment-output">解析コメントがここに表示されます。</p>
            
            <button type="button" class="btn" id="retry-btn">別の写真を解析する</button>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const dropText = document.getElementById('drop-text');
        const targetImage = document.getElementById('target-image');
        const analyzeBtn = document.getElementById('analyze-btn');
        const retryBtn = document.getElementById('retry-btn');
        const statusText = document.getElementById('status-text');
        const errorDisplay = document.getElementById('error-display');
        
        const aiScanner = document.getElementById('ai-scanner');
        const scanProgress = document.getElementById('scan-progress');
        const scanDetail = document.getElementById('scan-detail');

        const setupStage = document.getElementById('setup-stage');
        const resultStage = document.getElementById('result-stage');
        
        const ageOutput = document.getElementById('age-output');
        const expressionOutput = document.getElementById('expression-output');
        const scoreOutput = document.getElementById('score-output');
        const scoreTbody = document.getElementById('score-tbody');
        const commentOutput = document.getElementById('comment-output');

        let isModelLoaded = false;
        let selectedFile = null;

        async function loadModels() {
            try {
                statusText.textContent = '高精度顔解析モデルを読込中...';
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
                
                isModelLoaded = true;
                analyzeBtn.textContent = '全17項目 ディープスキャンを開始';
                statusText.textContent = '準備完了。顔以外の画像は自動的に弾かれます。';
                analyzeBtn.disabled = false;
            } catch (error) {
                console.error(error);
                statusText.textContent = 'モデル的ロードに失敗しました。再読み込みしてください。';
            }
        }
        loadModels();

        dropZone.addEventListener('click', () => {
            if(!aiScanner.classList.contains('hidden')) return;
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (event) => {
                    targetImage.src = event.target.result;
                    targetImage.classList.remove('hidden');
                    dropText.classList.add('hidden');
                    errorDisplay.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        const scanSteps = [
            "1. Eラインと顎の突出度を測定中...",
            "2. 顔の黄金比 (1:1:1) を計算中...",
            "3. 中顔面（目の下〜唇）の距離を測定中...",
            "4. フェイスラインのエッジを検出中...",
            "5. おでこの丸み（立体感）を推論中...",
            "6. 涙袋のボリュームをスキャン中...",
            "7. 白目の透明度・コントラストを確認中...",
            "8. 蒙古襞と目頭の形状を解析中...",
            "9. 黒目の比率 (1:2:1) を確認中...",
            "10. 眉毛と目の距離を測定中...",
            "11. 鼻尖（鼻先）の角度を測定中...",
            "12. 鼻翼（小鼻）の広がりを計算中...",
            "13. 鼻筋の直線ラインを確認中...",
            "14. 口角の上昇角度を計算中...",
            "15. 人中の長さを測定中...",
            "16. 唇のシワと厚みを推論中...",
            "17. 歯並びと口元の美しさを解析中..."
        ];

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile || !isModelLoaded) return;
            analyzeBtn.disabled = true;
            errorDisplay.classList.add('hidden');
            aiScanner.classList.remove('hidden');
            
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 2;
                if(progress > 99) progress = 99;
                scanProgress.textContent = `${progress}%`;
                const stepIndex = Math.floor((progress / 100) * scanSteps.length);
                if(scanSteps[stepIndex]) { scanDetail.textContent = scanSteps[stepIndex]; }
            }, 100);

            try {
                const detection = await faceapi.detectSingleFace(targetImage, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.6 }))
                    .withFaceLandmarks()
                    .withFaceExpressions()
                    .withAgeAndGender();

                if (!detection) throw new Error('FACE_NOT_FOUND');

                const landmarks = detection.landmarks;
                const jaw = landmarks.getJawOutline();
                const leftEye = landmarks.getLeftEye();
                const rightEye = landmarks.getRightEye();
                const nose = landmarks.getNose();
                const mouth = landmarks.getMouth();
                const leftBrow = landmarks.getLeftEyeBrow();
                const rightBrow = landmarks.getRightEyeBrow();
                
                const age = Math.round(detection.age);
                const expressions = detection.expressions;
                const maxExpr = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                const exprMap = { neutral: '真顔', happy: '笑顔', sad: '悲しみ', angry: '怒り', fearful: '恐れ', disgusted: '嫌悪', surprised: '驚き' };
                const exprStr = exprMap[maxExpr] || maxExpr;

                const faceWidth = Math.abs(jaw[16].x - jaw[0].x);
                const faceHeight = Math.abs(jaw[8].y - Math.min(leftBrow[2].y, rightBrow[2].y));
                const dist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));

                const scores = {};
                scores["Eラインが整っている (推論)"] = Math.min(100, Math.max(20, 100 - Math.abs((dist(nose[3], jaw[8])/faceHeight) - 0.4)*200));
                scores["顔の黄金比に近い (1:1:1)"] = Math.min(100, Math.max(20, 100 - Math.abs(Math.abs(nose[6].y - Math.min(leftBrow[2].y, rightBrow[2].y)) - Math.abs(jaw[8].y - nose[6].y)) / faceHeight * 300));
                scores["中顔面（ちゅうがんめん）が短い"] = Math.min(100, Math.max(20, 100 - Math.abs(((mouth[0].y + mouth[6].y) / 2 - (leftEye[3].y + rightEye[0].y) / 2)/faceHeight) - 0.42)*350);
                scores["フェイスラインがシャープ"] = Math.min(100, Math.max(20, 100 - Math.abs((Math.abs(jaw[12].x - jaw[4].x)/faceWidth) - 0.75)*250));
                scores["おでこに適度な丸みがある (推論)"] = 55 + (faceWidth % 30); 
                scores["涙袋（なみだぶくろ）がぷっくりしている (推論)"] = 55 + (Math.abs((mouth[0].y + mouth[6].y) / 2 - (leftEye[3].y + rightEye[0].y) / 2) % 30);
                scores["白目が澄んでいる (推論)"] = 60 + (faceHeight % 25);
                scores["蒙古襞（もうこひだ）が薄い"] = Math.min(100, Math.max(20, 100 - Math.abs(Math.abs(rightEye[0].x - leftEye[3].x) - Math.abs(leftEye[3].x - leftEye[0].x))/faceWidth * 350));
                scores["黒目の比率が大きい (黄金比)"] = Math.min(100, Math.max(20, 100 - Math.abs((Math.abs(leftEye[5].y - leftEye[1].y)/Math.abs(leftEye[3].x - leftEye[0].x)) - 0.45)*300));
                scores["眉毛と目の距離が近い"] = Math.min(100, Math.max(20, 100 - Math.abs((Math.abs(leftEye[1].y - leftBrow[2].y)/faceHeight) - 0.1)*400));
                scores["鼻尖（びせん）がツンとしている"] = Math.min(100, Math.max(20, 100 - Math.abs((dist(nose[3], nose[6])/faceHeight) - 0.1)*350));
                scores["鼻翼（小鼻）が広がっていない"] = Math.min(100, Math.max(20, 100 - Math.abs(Math.abs(nose[4].x - nose[0].x) - Math.abs(rightEye[0].x - leftEye[3].x))/faceWidth * 300));
                scores["鼻筋が通っている"] = Math.min(100, Math.max(20, 100 - (Math.abs(nose[0].x - nose[3].x)/faceWidth * 500)));
                scores["口角（こうかく）が上がっている"] = Math.min(100, Math.max(20, 100 - Math.abs(((mouth[0].y + mouth[6].y)/2 - mouth[3].y)/faceHeight - 0.05)*500));
                scores["人中（じんちゅう）が短い"] = Math.min(100, Math.max(20, 100 - Math.abs((Math.abs(mouth[3].y - nose[6].y)/Math.abs(jaw[8].y - mouth[9].y)) - 0.5)*250));
                scores["唇がふっくらしている"] = Math.min(100, Math.max(20, 100 - Math.abs((Math.abs(mouth[9].y - mouth[3].y)/faceHeight) - 0.1)*300));
                scores["歯並びが綺麗 (推論)"] = 55 + (Math.abs(jaw[12].x - jaw[4].x) % 30);

                let totalScore = 0;
                let htmlRows = '';
                for(let key in scores) {
                    let s = Math.round(scores[key]);
                    if(s > 100) s = 100;
                    totalScore += s;
                    htmlRows += `<tr><td>${key}</td><td class="score-value">${s} 点</td></tr>`;
                }

                let finalScore = Math.floor(((totalScore / 17) - 65) * 1.4 + 46);
                if (finalScore > 85) finalScore = 85; 
                if (finalScore < 30) finalScore = 30;

                setTimeout(() => {
                    clearInterval(progressInterval);
                    aiScanner.classList.add('hidden');
                    ageOutput.textContent = age;
                    expressionOutput.textContent = exprStr;
                    scoreTbody.innerHTML = htmlRows;
                    scoreOutput.textContent = finalScore;
                    commentOutput.textContent = finalScore >= 60 ? '非常に高いポテンシャルです。' : '要自己プロデュース。';
                    setupStage.classList.add('hidden');
                    resultStage.classList.remove('hidden');
                    analyzeBtn.disabled = false;
                }, 1500);
            } catch (e) {
                clearInterval(progressInterval);
                aiScanner.classList.add('hidden');
                errorDisplay.classList.remove('hidden');
                analyzeBtn.disabled = false;
            }
        });

        retryBtn.addEventListener('click', () => { location.reload(); });
    });
</script>
</body>
</html>
